# ─────────────────────────────────────────────────────────────
# _new_scorers_skkb_exp_001_baseline_no_expected_enums_uat
# ─────────────────────────────────────────────────────────────
# Diagnostic LLM-as-a-judge evaluation of the SK (Slovak)
# Knowledge-Base for Hey George.
#
# GOAL: identify what to improve on each stage of the pipeline —
#   (a) the user query itself (ambiguous / clear),
#   (b) retrieval/pruning quality (did the right ENUMs enter the post-prune candidate pool?),
#   (c) reranker quality (did it pick the right ENUMs from the pool?),
#   (d) retrieved/reranked KB content quality (is the available content deep enough?),
#   (e) post-prune candidate-pool KB coverage (is enough relevant KB content available to select?),
#   (f) final-answer quality (does agent_response match expected_response?),
#   (g) language compliance (Slovak expected, Czech output is a bug).
#
#
# Data prep: hg-ds-evals/experiments/skkb/notebooks/skkb_001_import_traces.ipynb
# Input source: direct MLflow search_traces output.
# ─────────────────────────────────────────────────────────────


# ── Experiment Metadata ───────────────────────────────────────
experiment:
  name: "skkb_exp_001_baseline_no_expected_enums_uat_new_scorers"
  persona: >
    You are an expert evaluator assessing the end-to-end quality of a Slovak
    retail-banking knowledge-base (KB) chatbot ('Hey George'), with the
    goal of pinpointing concrete improvements for the bot/agent team, the
    retrieval/reranker team, and the KB content team.
  task: >
    Diagnostic evaluation of ENUM selection quality, selected KB context,
    best available post-prune candidate context adequacy, final-answer quality, and
    language compliance.
  description: >
    Evaluate Slovak KB chatbot trace. Diagnose whether failures come from
    retrieval, reranking/ENUM selection, selected KB context, retrieved/reranked
    KB content quality, answer generation, language compliance, or test-case
    quality. Use the provided Slovak inputs as evidence, but return all judge
    reasoning and output fields in English only.

  version: "1.0.0"
  author: "Ita Ćirović Donev"
  created_date: "2026-04-17"
  tags:
    - "baseline"
    - "skkb"
    - "kb-eval"
    - "diagnostic"
    - "uat"


