    additional_instructions: |
      ## Cross-field rules

      - **Evaluation order:** perform the judgment in this order: first
        classify `case_scope`; then check whether
        `expected_reference_looks_wrong`; then choose
        `optimal_enum_selection`; then write
        `expected_answer_summary_with_optimal_context`; then score
        post-prune candidate-pool adequacy and selected-context sufficiency;
        then score answer alignment, groundedness, and language compliance;
        then write diagnostic fields and team-specific action suggestions.
        Do not let a later answer-quality failure retroactively change the
        candidate-pool or selected-context judgments.
      - **Selection relevance:** judge selected ENUM relevance from the
        selected KB fragment text in `reranked_kb_context`, using
        `reranked_enum_ids` as identifiers. If selection is empty for a
        KB-answerable case and useful candidates exist in the post-prune
        pool, this is reranker-side evidence. If no useful candidate exists
        in the post-prune pool, leave reranker action empty and let
        candidate-pool adequacy / downstream retrieval metrics explain it.
      - **Case-scope usage:** `case_scope` is the actual scope label. Use
        ONLY the declared values (`kb`, `api`, `kb_and_api`,
        `out_of_scope`, `ambiguous`). For account-data/tool queries,
        prefer `api`; use `kb_and_api` only when both KB policy/process
        content and API/account data are genuinely required.
      - **Scope-aware scoring:** For `case_scope` values `api`,
        `out_of_scope`, or `ambiguous`, do not treat weak or empty KB
        context as a retriever, reranker, or KB-content failure. For these
        scopes, set `selection_semantic_relevance`,
        `selected_context_sufficiency`, and
        `optimal_retrieved_context_adequacy` to score 2 when KB context is
        not required and the selected KB context does not actively mislead
        the final answer. Score these dimensions low only when the case is
        `kb` or `kb_and_api`, or when KB content is genuinely required.
      - **Team separation in suggestions:** each `*_improvement_suggestion`
        targets exactly one team. Do not put reranker prompt/parser
        actions in `agent_improvement_suggestion`, KB content team asks in
        `retrieval_improvement_suggestion`, or answer-prompt actions in
        `reranker_improvement_suggestion`.
      - **Reference-defect rule:** set `expected_reference_looks_wrong`
        only for obvious gold-reference defects. When it is `true`,
        `expected_reference_issue_description` and
        `test_case_improvement_suggestion` MUST both be non-empty. When
        it is `false`, `expected_reference_issue_description` should be
        `""`. When it is `true`, score answer/context dimensions against
        the user query and available KB evidence rather than forcing low
        scores solely because the answer differs from the defective
        reference. Diagnostic fields that normally compare against
        `expected_response` should instead compare against the user's query
        and the best-supported answer from available KB evidence. Do not
        list facts as missing merely because they appear only in a defective
        reference.
      - **At-least-one-action rule:** at least one of the five action
        outputs (`retrieval_improvement_suggestion`,
        `reranker_improvement_suggestion`, `agent_improvement_suggestion`,
        `kb_improvement_suggestion`, or
        `test_case_improvement_suggestion`) MUST be non-empty when a low
        score reflects an actionable retrieval, reranker, KB, agent, or
        test-set issue, or when `expected_reference_looks_wrong == true`.
        Do not invent actions for expected low scores caused solely by
        `case_scope=api`, `out_of_scope`, or `ambiguous`; explain those in
        `overall_explanation` instead.
