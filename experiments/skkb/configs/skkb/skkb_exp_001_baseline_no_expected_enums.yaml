# ── Rubric Configuration ─────────────────────────────────────
rubric:
  base: null
  pass_threshold: 1.4

  critical_evaluation_rules: |
    OUTPUT CONTRACT:
      - Return ONLY valid JSON.
      - All JSON string values MUST be written in English only.
      - Slovak/Czech text is input evidence only. Translate relevant
        Slovak/Czech facts into English before writing output.
      - Do not copy raw Slovak/Czech phrases into output fields.

    Evidence rules:
      - Use `post_prune_candidates_text` as the post-prune candidate pool
        available to the reranker. You do not see the full SKKB.
      - Use `reranked_enum_ids` and `reranked_kb_context` as the final
        selected context that reached the agent.
      - Use `expected_response` as the expert reference. Treat it as a
        reference for essential banking facts, required actions, constraints,
        and expected outcomes; do not require exact wording, ordering,
        greeting, verbosity, or harmless stylistic details. The gold ENUM
        list is intentionally withheld from this judge to avoid biasing
        `optimal_enum_selection`; exact ENUM-set comparisons are computed
        downstream.
      - Use `post_prune_enum_ids` only to keep `optimal_enum_selection`
        within the post-prune candidate pool and to support qualitative diagnosis.
      - Use `pre_prune_enum_ids` only as supporting diagnostic evidence
        when available; do not choose `optimal_enum_selection` from that
        earlier stage.
        Exact retrieval recall, reranker recall, precision, and miss
        categories are computed downstream. Do not treat your own ID-set
        comparison as the source of truth for exact retrieval or reranker
        metrics.
      - Score `selected_context_sufficiency` using ONLY
        `reranked_kb_context`.
      - Score `optimal_retrieved_context_adequacy` using ONLY the best
        possible selection from `post_prune_candidates_text`. Do not infer
        what may exist elsewhere in the full SKKB.
      - A post-prune candidate-pool content gap is not automatically a KB
        content team issue. If the post-prune candidate pool is missing the
        relevant topic or contains mostly off-topic candidates, treat that as
        retrieval/pruning-side evidence or leave exact miss attribution to
        downstream metrics. Recommend KB content team work only when relevant
        post-prune KB fragments are present but their content is too thin,
        incomplete, or unclear.
      - Treat `expected_reference_looks_wrong` as a high-bar exception
        for obvious gold-reference defects only. Do NOT use it to explain
        ordinary retrieval, reranking, KB-content, or agent-answer failures.
      - When `expected_reference_looks_wrong` is true, do not force low
        answer/context scores only because they disagree with the defective
        reference. Score against the user query and available KB evidence,
        then describe the reference defect separately.

  domain_specific_guidance: |
    - ENUM codes are KB fragment identifiers, e.g. `SAVING@ACCOUNT_MOVEMENTS`.
      Each ENUM represents one retrieved or selected knowledge-base fragment.
    - The agent may personalize the greeting (uses the user's first name).
      Do not penalize or reward personalization.
    - **Language**: This is a Slovak deployment. `agent_response` must be
      in Slovak. Slovak and Czech are not interchangeable for this
      evaluation. Czech output, mixed Czech/Slovak paragraphs, or another
      language is a language-compliance failure.
    - **Agent-prompt root cause**: Czech drift is likely an agent
      prompt or language-guard issue. When it occurs, score
      `language_compliance` low and make `agent_improvement_suggestion`
      specific in English.
    - Banking-specific terms (e.g. "sporenie", "pokladnička", "trvalý
      príkaz") must be factually accurate.
    - Transactional / account-specific queries ("what is my balance?")
      typically belong to `case_scope=api`, not the KB. Use
      `case_scope=kb_and_api` only when the user genuinely needs both
      account-specific data/tooling and KB policy/process guidance. Do
      NOT treat pure API/account-data queries as KB content gaps.
    - ENUM IDs usually follow `<PRODUCT>@<TOPIC>`, e.g. `SAVING@ACCOUNT_MOVEMENTS`, 
      where `SAVING` is the product namespace.
    - Product-specific queries should generally be supported by ENUMs whose
      product namespace matches the queried product. Do not rely on product
      prefix alone if the topic after `@` is semantically wrong. Generic
      queries may use generic or cross-product ENUMs.

  final_reminders: |
    1. **Output ONLY valid JSON** — no markdown fencing, no prose outside JSON.
    2. **English-only output is mandatory.** All JSON string values must
       be in English. Do not copy Slovak/Czech source text into the output.
    3. **Per-dimension reasoning** under 250 characters;
       **overall_explanation** between 150 and 500 characters; all
       improvement suggestion fields under 400 characters each;
       **expected_reference_issue_description** under 300 characters.
    4. All array fields must be arrays of strings. Use `[]` when nothing
       applies.
    5. Cite ENUM IDs (e.g. `SAVING@ACCOUNT_MOVEMENTS`) verbatim when
       naming them in reasoning fields.
    6. When explaining retrieval/reranker issues, describe the semantic
       pattern you observe. Exact expected-ENUM membership, retrieval
       misses, and reranker misses are derived downstream from ID lists.
    7. Set `expected_reference_looks_wrong=true` only for clear
       query/reference contradictions or obvious gold-label defects. Do
       not use it merely because the agent answer is poor or the post-prune
       candidate pool is weak.

  # ── Dimensions ──────────────────────────────
  dimensions:
    # --- Query ---
    - id: query_clarity
      name: "Query Clarity"
      weight: 1.0
      description: >
        Is `user_query` clear and understandable, or ambiguous / unclear?
      scale:
        - score: 2
          label: "clear"
          description: The query is unambiguous; a single well-defined answer is expected.
        - score: 1
          label: "ambiguous"
          description: Two or more plausible interpretations, but a reasonable default exists.
        - score: 0
          label: "unclear"
          description: It is hard to discern what the user is asking.

    # --- Reranker semantic quality ---
    - id: selection_semantic_relevance
      name: "Selection Semantic Relevance"
      weight: 2.0
      description: >
        Are the KB fragments selected by the reranker relevant to the user
        query? Judge semantic relevance from `reranked_kb_context` and the
        selected ENUM IDs together, not from ENUM ID strings alone. Exact
        selection precision/recall/F1 should be derived programmatically;
        this score captures whether the selected fragments would naturally
        support the user's intent.
      scale:
        - score: 2
          label: "relevant"
          description: Every selected ENUM directly addresses the query.
        - score: 1
          label: "mixed"
          description: Most selected ENUMs are relevant; at most two are tangential or off-topic.
        - score: 0
          label: "irrelevant"
          description: More than two selected ENUMs are wrong, irrelevant, or misaligned with intent. For `case_scope` = `kb` or `kb_and_api`, an empty `reranked_enum_ids` / `reranked_kb_context` is also score 0.

    # --- Context and KB content quality ---
    - id: selected_context_sufficiency
      name: "Selected Context Sufficiency"
      weight: 2.0
      description: >
        Does `reranked_kb_context`, exactly as passed to the agent, contain
        enough information to answer the user query and support
        `expected_response`? Ignore any KB content that is not present in
        `reranked_kb_context`.
      scale:
        - score: 2
          label: "sufficient"
          description: The selected context contains specific, actionable content that fully supports the expected answer.
        - score: 1
          label: "partly_sufficient"
          description: The selected context supports the core answer but misses one or two operational details.
        - score: 0
          label: "insufficient"
          description: The selected context is off-topic, empty, or too shallow to answer the query.

    - id: optimal_retrieved_context_adequacy
      name: "Best Available Post-Prune Context Adequacy"
      weight: 2.0
      description: >
        First choose `optimal_enum_selection` from only the ENUMs available
        in `post_prune_candidates_text`. Then judge whether those post-prune
        fragments contain enough information for the agent to give a complete,
        useful, and correct answer to the user's query. Use `expected_response`
        as the expert reference for essential facts and expected outcome, but
        do not require exact wording or extra details that are not necessary
        to satisfy the user. Do not infer what may exist elsewhere in the full
        SKKB.
      scale:
        - score: 2
          label: "adequate"
          description: The best available post-prune candidate selection supports a complete answer that would satisfy the user's reasonable expectation, including all essential facts, steps, limits, conditions, and caveats.
        - score: 1
          label: "thin"
          description: The best available post-prune candidate selection supports the core answer, but a complete user-satisfying answer would still miss some useful operational detail, condition, caveat, or next step.
        - score: 0
          label: "gap"
          description: The best available post-prune candidate selection does not contain enough core information to answer the user's query correctly or usefully.

    # --- Final answer ---
    - id: answer_expected_alignment
      name: "Answer Expected Alignment"
      weight: 2.0
      description: >
        Does `agent_response` preserve the essential factual content and
        expected action from `expected_response`? Paraphrase, different
        ordering, and harmless omission of stylistic details are acceptable;
        factual mismatch, contradiction, missing required facts, or wrong
        refusal is not.
      scale:
        - score: 2
          label: "aligned"
          description: The answer covers all important expected facts and no important expected meaning is lost.
        - score: 1
          label: "partial"
          description: The core answer aligns but one or two important details are missing or slightly wrong.
        - score: 0
          label: "misaligned"
          description: The answer misses the core expected answer, contradicts it, or answers a different question.

    - id: answer_groundedness
      name: "Answer Groundedness"
      weight: 2.0
      description: >
        Are the factual claims in `agent_response` supported by
        `reranked_kb_context`? Score support against selected context only,
        not against real-world truth. A factually correct claim should still
        be marked unsupported if it is absent from the selected context.
      scale:
        - score: 2
          label: "grounded"
          description: All material claims are supported by the selected KB context.
        - score: 1
          label: "mostly_grounded"
          description: The answer is mostly grounded but contains one minor unsupported claim or wording overreach.
        - score: 0
          label: "ungrounded"
          description: The answer contains important unsupported, fabricated, or contradictory claims.

    # --- Language compliance ---
    - id: language_compliance
      name: "Language Compliance"
      weight: 1.0
      description: >
        This is a Slovak deployment; `agent_response` must be written in
        Slovak. Score Czech or other-language output as a failure.
      scale:
        - score: 2
          label: "slovak"
          description: Response is in Slovak throughout.
        - score: 1
          label: "mostly_slovak"
          description: Response is mostly Slovak with one or two isolated non-Slovak words or phrases (e.g. a single idiom slipped in).
        - score: 0
          label: "wrong_language"
          description: Response is in any language other than Slovak.

  # ── Input Fields ────────────────────────────────────────────
  input_fields:
    - name: user_query
      description: >
        The user's original question (Slovak).
      required: true

    - name: pre_prune_enum_ids
      description: >
        JSON list of merged retrieve candidates before pruning. Use this
        only as diagnostic context for possible pruning/retrieval loss; do
        not choose `optimal_enum_selection` from this earlier stage.
      required: false

    - name: post_prune_candidates_text
      description: >
        The full post-prune candidate pool offered to the reranker, one
        block per ENUM in rank order. Format:
        `ENUM_ID: <description>\n\nENUM_ID: <description>\n\n...`
        The reranker saw this same pool. `reranked_enum_ids` contains the
        valid final selection after raw reranker output was mapped back to
        this pool. Use this to understand what content was available to the
        reranker. Exact retriever and reranker miss categories are computed
        downstream from the ID lists.
      required: true

    - name: post_prune_enum_ids
      description: >
        JSON list of ENUM IDs in the post-prune candidate pool, in rank
        order. Use this for exact set/ranking diagnosis instead of
        string-searching `post_prune_candidates_text`.
      required: true

    - name: reranked_enum_ids
      description: >
        JSON list of valid ENUM IDs that were selected, survived mapping
        back to post-prune candidates, and were fed to the agent. This is the
        final system choice, not the unvalidated raw reranker output.
      required: true

    - name: reranked_kb_context
      description: >
        Full text of the KB fragments passed to the agent (post-rerank).
        Formatted as `ENUM_ID: <text>` blocks. Source of truth for
        selected_context_sufficiency and groundedness.
      required: true

    - name: expected_response
      description: >
        Expert-authored reference answer (Slovak). Use it as a reference for
        essential banking facts, required actions, constraints, and expected
        outcomes. Do not treat greeting, wording, ordering, verbosity, or
        harmless paraphrase as required.
      required: true

    - name: agent_response
      description: >
        The agent's final answer. Primary target of answer_expected_alignment,
        answer_groundedness, and language_compliance.
      required: true

  # ── Output Schema ───────────────────────────────────────────
  # JSON structure the judge must return in addition to rubric_scores.
  # Exact numeric metrics should be derived downstream from the ID lists;
  # this schema captures scope classification, diagnostic evidence, and
  # concrete action points.
  output_schema:
    fields:
      # --- Scope ---
      - name: case_scope
        type: string
        enum:
          - kb
          - api
          - kb_and_api
          - out_of_scope
          - ambiguous
        description: >
          Label the query's actual scope, independently of answer quality
          and independently of whether that scope was easy to determine.
          Use `kb` for queries answerable from KB content. Use
          `api` for balance, transactions, cards, or account-specific
          questions that should be answered by API/data tools rather
          than KB content. Use `kb_and_api` only when the query
          genuinely needs both. Use `out_of_scope` when the query is
          clearly outside banking (e.g. "What is the weather?"). Use
          `ambiguous` when the query is too unclear or broad to
          determine scope.

      # --- Reference-defect check ---
      - name: expected_reference_looks_wrong
        type: boolean
        description: >
          True ONLY for clear, evidence-backed defects in the gold
          reference itself: for example, `expected_response` contradicts
          the user's query intent, or the reference expects KB behavior
          for what is clearly an API-only request. This is a high-bar
          test-set flag. Do NOT set it merely because the agent scored
          poorly, retrieval was weak, the KB seems thin, or you would
          phrase the answer differently.

      - name: expected_reference_issue_description
        type: string
        description: >
          When `expected_reference_looks_wrong` is true, briefly
          describe the specific contradiction between the query and the
          gold reference (`expected_response`). Focus on the labeling
          defect itself, not on agent quality. Max 300 chars. Empty
          string (`""`) when `expected_reference_looks_wrong` is false.

      # --- ENUM/context details for human review ---
      - name: optimal_enum_selection
        type: array
        description: >
          ENUM IDs from `post_prune_enum_ids` / `post_prune_candidates_text`
          that together provide the best available evidence for answering
          the user's query completely. Choose based on the content of the
          post-prune fragments, not on ID-string similarity alone. Include
          all post-prune ENUMs needed to satisfy the user's reasonable
          information need: required facts, actions, limits, conditions,
          channels, eligibility, fees, or caveats. Exclude redundant,
          merely related, or distracting ENUMs. Do not invent IDs outside
          the post-prune candidate pool. Choose this BEFORE scoring
          `rubric_scores.optimal_retrieved_context_adequacy.score`, as
          that score depends on this selection.

      - name: expected_answer_summary_with_optimal_context
        type: string
        description: >
          In 2–4 sentences, summarize what the agent should have
          answered, derived EXCLUSIVELY from the content of ENUMs in
          `optimal_enum_selection` — do not use other KB knowledge. If
          those ENUMs do not contain enough information, output EXACTLY
          "Answer is not available based on given information".

      - name: extra_or_distracting_enums
        type: array
        description: >
          Selected ENUM IDs (from `reranked_enum_ids`) that are
          irrelevant, too generic, or likely to distract answer
          generation. `[]` if all selected ENUMs are useful.

      - name: unavailable_facts_in_selected_context
        type: array
        description: >
          Facts from `expected_response` that are not available in
          `reranked_kb_context`. These may be caused by retrieval/pruning,
          reranker, or post-prune candidate-pool content gaps. When
          `expected_reference_looks_wrong` is true, compare against the
          user's query and best-supported answer from available KB
          evidence instead of blindly using the defective reference. Use
          `[]` when selected context is sufficient. Use "Answer is not 
          available based on given information" when the `reranked_kb_context` is empty.

      # --- Answer-level details ---
      - name: missing_facts
        type: array
        description: >
          Facts present in `expected_response` but absent, contradicted,
          or materially weakened in `agent_response`. When
          `expected_reference_looks_wrong` is true, compare against the
          user's query and best-supported answer from available KB
          evidence instead of blindly using the defective reference. Use
          `[]` when none.

      - name: hallucinated_claims
        type: array
        description: >
          Claims in `agent_response` that are NOT supported by
          `reranked_kb_context`. MUST be non-empty whenever
          `rubric_scores.answer_groundedness.score <= 1` and the 
          `reranked_kb_context` is not empty; list the
          specific unsupported claims. Use `[]` when none and "Answer 
          is not available based on given information" when the `reranked_kb_context` 
          is empty.

      # --- Candidate-pool diagnosis ---
      - name: retrieved_pool_inadequacy_identified
        type: boolean
        description: >
          True ONLY when `case_scope` is `kb` or `kb_and_api` AND
          `rubric_scores.optimal_retrieved_context_adequacy.score <= 1`
          — i.e. an in-scope KB-answerable query exposes missing or
          too-thin content in the best available post-prune ENUM selection.
          This flags candidate-pool inadequacy, not necessarily a KB
          content team issue. Do NOT set for `api`, `out_of_scope`, or
          `ambiguous` cases. This is NOT a claim about the full SKKB, only
          about the post-prune candidate pool.

      - name: retrieved_pool_inadequacy_description
        type: string
        description: >
          When `retrieved_pool_inadequacy_identified` is true,
          describe specifically what is missing from the best available
          post-prune candidate context: facts, steps, limits, conditions, channels,
          fees, or topics. Max 400 chars. Empty string (`""`) when no
          candidate-pool inadequacy is identified.

      # --- Technical/action diagnosis ---
      - name: retrieval_improvement_suggestion
        type: string
        description: >
          Concrete action for the retrieval/pruning team. Non-empty when the
          post-prune candidate pool lacks clearly relevant fragments,
          contains mostly off-topic fragments, contains only overly
          generic fragments where a specific topic/product fragment is
          needed, or shows lexical/semantic mismatch with the query. Do
          not use this field for cases where good candidates were
          present in the post-prune pool but the reranker failed to select them. Max 400
          chars. Empty string (`""`) when no retrieval action is
          evidenced.

      - name: reranker_improvement_suggestion
        type: string
        description: >
          Concrete action for the reranker team. Non-empty ONLY when
          expected/better ENUMs were present in the pool but were not
          selected, or when clearly irrelevant ENUMs were selected
          (typically `rubric_scores.selection_semantic_relevance.score <= 1`).
          Max 400 chars. Empty string (`""`) when no reranker action is
          evidenced.

      - name: agent_improvement_suggestion
        type: string
        description: >
          Concrete action for the agent team — answer prompt,
          Slovak language guard, disambiguation branch, context-use
          instruction. Non-empty for answer-generation, groundedness,
          or language-compliance failures. Describe Czech-drift
          evidence in English only; do not copy Slovak/Czech phrases.
          Max 400 chars. Empty string (`""`) when no agent-side
          improvement is needed.

      - name: kb_improvement_suggestion
        type: string
        description: >
          Concrete action for the KB content team — e.g. "add a new ENUM
          SAVING@CASH_DEPOSIT_LIMITS documenting daily cash deposit
          limits per branch", "expand SAVING@ACCOUNT_MOVEMENTS with
          concrete cut-off times for transfers". Non-empty ONLY when
          `retrieved_pool_inadequacy_identified == true` AND relevant
          post-prune KB fragments exist but are too thin, incomplete, or
          unclear. Do NOT assign a KB content team action merely because the
          retriever failed to retrieve the right topic. Max 400 chars.
          Empty string (`""`) when no KB-side improvement is needed.

      - name: test_case_improvement_suggestion
        type: string
        description: >
          Concrete action for test-set maintainers. Non-empty ONLY when
          the gold reference appears wrong (`expected_reference_looks_wrong
          == true`) or the case is too ambiguous/underspecified for
          reliable KB evaluation. Use this for fixing labels, expected answer, 
          or scope framing. Max 400 chars. Empty
          string (`""`) when no test-set action is needed.

      - name: overall_explanation
        type: string
        description: >
          English only.
          3–5 sentence summary tying per-dimension reasoning together
          and justifying the weakest score. If relevant, mention the
          gold-reference problem briefly here, but put the concrete
