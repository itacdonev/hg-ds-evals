# ── Rubric Configuration ─────────────────────────────────────
rubric:
  base: null
  pass_threshold: 1.4

  critical_evaluation_rules: |
    OUTPUT CONTRACT:
      - Return ONLY valid JSON.
      - All JSON string values MUST be written in English only.
      - Do not copy raw user-query or agent-response text into output fields.

    Detection rules:
      - Use ISO 639-1 lowercase codes for detected languages:
        `cs` (Czech), `sk` (Slovak), `en` (English), `uk` (Ukrainian),
        `de` (German), `hu` (Hungarian), `pl` (Polish), `ru` (Russian),
        `ro` (Romanian), `hr` (Croatian), `sr` (Serbian).
        Use the closest standard ISO 639-1 code for any other language.
      - Use `mixed` only when two or more languages share a roughly
        comparable share of the text (not when one language dominates
        with a few foreign loanwords).
      - Use `unknown` only when the language genuinely cannot be
        determined (e.g. empty text, pure numerals, single emoji).
      - For `actual_response_detected_language` ONLY, use the additional
        value `empty` when `actual_response` is empty or whitespace only.

    Compliance rules:
      - The actual_response language MUST match the user_query language.
      - Czech (`cs`) and Slovak (`sk`) are NOT interchangeable. A Czech
        user question answered in Slovak (or vice versa) is a mismatch.
      - A personalized greeting that just uses the user's first name
        (e.g. "Krystýna,") does not affect language scoring.
      - A single isolated loanword or technical term that is the same
        spelling across the languages involved (e.g. "OK", "online",
        "PIN") is not a language switch.

  domain_specific_guidance: |
    - This is the Slovak (`sk`) production deployment of Hey George, but
      real users write in Czech, Slovak, English, Ukrainian, German, and
      occasionally other languages. The agent SHOULD respond in whatever
      language the USER wrote in.
    - Czech ↔ Slovak drift is a known recurring issue. Score it as a
      mismatch when the user wrote one and the agent answered in the
      other.
    - Banking-specific terms (`spoření`, `bežný účet`, `trvalý príkaz`,
      etc.) are language-bearing — they should be in the same language
      as the rest of the answer.

  final_reminders: |
    1. **Output ONLY valid JSON** — no markdown fencing, no prose
       outside JSON.
    2. **English-only output is mandatory** for all JSON string values.
    3. `user_query_detected_language` and `actual_response_detected_language`
       MUST be lowercase ISO 639-1 codes, or `mixed`, `unknown`, or
       (agent only) `empty`.
    4. `language_mismatch_description` MUST be `""` when
       `language_compliance.score == 2`, and non-empty otherwise.
       Max 200 chars.
    5. `overall_explanation` between 80 and 300 characters.

  # ── Dimensions ──────────────────────────────
  dimensions:
    - id: language_compliance
      name: "Language Compliance"
      weight: 1.0
      description: >
        Is `actual_response` written in the same language as `user_query`? 
        Brand and product names or labels, UI phrases, URLs, and banking terms (or feature names) commonly used in 
        another language are acceptable; any other non-user-language content is a violation.
      scale:
        - score: 2
          label: "matches"
          description: > 
              The response is in the user's language throughout, or the response is 
              empty (an empty response cannot violate language compliance). It contains 
              no meaningful non-user-language content, except brand names, URLs, or exact 
              untranslated product/app feature names.
        - score: 1
          label: "mostly_matches"
          description: >
              The response is mainly in the user's language. The main answer is still
              understandable in the user's language.
        - score: 0
          label: "mismatch"
          description: >
                The response is wholly or predominantly in a language other than the 
                user's, or contains more than a couple of isolated non-user-language 
                words or phrases.
  # ── Input Fields ────────────────────────────────────────────
  input_fields:
    - name: user_query
      description: >
        The user's original message, in the user's own language.
      required: true

    - name: actual_response
      description: >
        The agent's final reply to the user. The text whose language
        compliance is being judged.
      required: true

  # ── Output Schema ───────────────────────────────────────────
  output_schema:
    fields:
      - name: user_query_detected_language
        type: string
        description: >
          ISO 639-1 lowercase code for the language of `user_query`
          (e.g. `cs`, `sk`, `en`, `uk`, `de`, `hu`, `pl`, `ru`).
          Use `mixed` when two or more languages share roughly equal
          share. Use `unknown` when the language genuinely cannot be
          determined.

      - name: actual_response_detected_language
        type: string
        description: >
          ISO 639-1 lowercase code for the language of `actual_response`,
          using the same scheme as `user_query_detected_language`.
          Additionally, use `empty` when `actual_response` is empty or
          whitespace only.

      - name: language_mismatch_description
        type: string
        description: >
          When `language_compliance.score < 2`, briefly describe the
          mismatch in English (e.g. "user wrote in Czech, agent
          answered in Slovak", or "agent response is fully in English
          while user wrote in Slovak"). Max 200 chars. Empty string
          (`""`) when the score is 2.

      - name: overall_explanation
        type: string
        description: >
          English only. 1–3 sentences justifying the score and naming
          the detected languages on both sides. 80–300 chars.

    additional_instructions: |
      ## Cross-field rules

      - **Detection first, then compliance**: detect
        `user_query_detected_language` and
        `actual_response_detected_language` BEFORE scoring
        `language_compliance`. The score follows from the detected
        languages, not the other way around.
      - **Empty agent response**: if `actual_response` is empty or
        whitespace only, set `actual_response_detected_language` to
        `empty` and `language_compliance.score` to 0 with
        `language_mismatch_description` = "agent response is empty".
      - **Same-language guarantee**: when both detected languages are
        the same standard code (e.g. both `sk`), score MUST be 2 and
        `language_mismatch_description` MUST be `""`.
      - **Czech↔Slovak rule**: detected `cs` vs `sk` (in either
        direction) is a mismatch and scores 0, even though the
        languages look similar.
