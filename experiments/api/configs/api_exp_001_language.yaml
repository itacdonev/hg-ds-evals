# ─────────────────────────────────────────────────────────────
# api_exp_001_language
# ─────────────────────────────────────────────────────────────
# Minimal first-pass LLM-as-a-judge evaluation focused on
# LANGUAGE only for the API/agent-routing side of Hey George.
#
# GOAL:
#   (a) detect the language of `user_query`,
#   (b) detect the language of `actual_response`,
#   (c) score whether the agent answered in the same language
#       the user wrote in (the actual production concern: agent
#       drifting to a different language than the user).
#
# This is intentionally narrow. Other API-side judges (routing
# intent alignment, refusal appropriateness, answer alignment vs
# expected) can be added in later experiments.
#
# Data prep:  experiments/api/notebooks/import_traces_local.ipynb
#             with RUN_DATE = "hajek_prompt"
# Input source: UC table written at the bottom of that notebook.
# ─────────────────────────────────────────────────────────────


# ── Experiment Metadata ───────────────────────────────────────
experiment:
  name: "api_exp_001_language"
  persona: >
    You are an expert linguist evaluating the Hey George retail-banking
    conversational AI. Your job is to (1) identify the language of the
    user's query, (2) identify the language of the agent's reply, and
    (3) judge whether the agent answered in the same language the user
    wrote in.
  task: >
    Per-trace language detection (user query + agent response) and
    a language-compliance score.
  description: >
    Read the user's original message and the agent's final reply. Detect
    the language of each using ISO 639-1 codes, then score whether the
    agent matched the user's language. Czech and Slovak are NOT
    interchangeable. Return all reasoning in English.

  version: "0.1.0"
  author: "Ita Ćirović Donev"
  created_date: "2026-05-22"
  tags:
    - "api"
    - "language"
    - "diagnostic"


